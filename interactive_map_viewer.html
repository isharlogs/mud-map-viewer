<!-- NPC Detail Modal -->
<div id="npcModal" style="display:none" role="dialog" aria-modal="true" aria-labelledby="npcModalName">
    <div id="npcModalCard">
        <button id="npcModalClose" aria-label="Close">×</button>
        <div id="npcModalContent"></div>
    </div>
</div>

<!-- Hover Card -->
<div id="hoverCard" style="display:none" aria-hidden="true"></div>

<script>
        // Configuration
        const ROOM_WIDTH = 120;
        const ROOM_HEIGHT = 60;
        const GRID_STEP_X = 220;
        const GRID_STEP_Y = 180;
        const PADDING = 50;
        const MIN_ZOOM = 0.5;
        const MAX_ZOOM = 1.8;
        const ZOOM_STEP = 0.1;

        // State
        let state = {
            allZones: {},
            currentZone: null,
            currentFloor: 0,
            selectedRoom: null,
            zoom: 1,
            panX: 0,
            panY: 0,
            isDragging: false,
            dragStart: null,
            portalHistory: [],  // Track portal navigation: [{zone, room, exitDir}, ...]
            isInPortal: false,  // Whether currently viewing a portal map
            // go-portal view: null when not active, else { sourceVnum, portalVnum, direction }
            goPortalView: null,
            showNpcs:         false,
            npcData:          {},
            itemData:         {},
            _activeHoverNpc:  null
        };

        // ============================================================================
        // Data Loading
        // ============================================================================

        async function loadZoneData(zoneName) {
            if (state.allZones[zoneName]) {
                return state.allZones[zoneName];
            }
            try {
                // Match the filename the exporter produces:
                //   zone_name.lower().replace(' ','_').keep(alnum|_|-)
                const filename = zoneName.toLowerCase()
                    .replace(/\s+/g, '_')
                    .replace(/[^\w\-]/g, '_')
                    .replace(/_+/g, '_')
                    .replace(/^_|_$/g, '')
                    + '.json';

                const response = await fetch(filename);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                state.allZones[zoneName] = data;
                return data;
            } catch (error) {
                console.error(`Failed to load zone "${zoneName}":`, error);
                return null;
            }
        }

        // ============================================================================
        // UI Updates
        // ============================================================================

        function updateSidebar() {
            if (!state.currentZone) return;

            const zone = state.allZones[state.currentZone];
            if (!zone) return;

            // Go-portal view: sidebar shows portal room info
            if (state.goPortalView) {
                const { sourceVnum, portalVnum, direction } = state.goPortalView;
                let floor = null;
                for (const f of Object.values(zone.floors)) {
                    if (f.rooms[String(sourceVnum)]) { floor = f; break; }
                }
                if (!floor) return;
                const portalRoom = floor.rooms[String(portalVnum)];
                if (!portalRoom) return;

                document.getElementById('floorTabs').innerHTML = '';
                document.getElementById('roomVnum').textContent = `#${portalVnum}`;
                document.getElementById('roomName').textContent = portalRoom.name;
                document.getElementById('roomDesc').textContent = portalRoom.description || '';

                const exitsList = document.getElementById('exitsList');
                exitsList.innerHTML = '';
                const EXIT_ORDER = ['u','d','n','ne','nw','e','w','se','sw','s'];
                const exits = Object.entries(portalRoom.exits || {})
                    .filter(([, ex]) => ex.to_vnum !== sourceVnum)
                    .sort(([a], [b]) => {
                        const ai = EXIT_ORDER.indexOf(a.toLowerCase());
                        const bi = EXIT_ORDER.indexOf(b.toLowerCase());
                        if (ai === -1 && bi === -1) return a.localeCompare(b);
                        if (ai === -1) return 1; if (bi === -1) return -1;
                        return ai - bi;
                    });

                if (exits.length === 0) {
                    exitsList.innerHTML = '<div style="color:var(--text-dim);font-size:13px;">No onward exits</div>';
                } else {
                    exits.forEach(([dir, exitData]) => {
                        const toZone = state.allZones[exitData.to_zone];
                        const destRoom = toZone ? getRoom(toZone, exitData.to_vnum) : null;
                        const destName = exitData.is_cross_zone
                            ? exitData.to_zone
                            : (destRoom ? destRoom.name : 'Unknown');

                        const btn = makeExitBtn(dir, destName, exitData);
                        btn.onclick = () => {
                            state.goPortalView = null;
                            if (exitData.is_cross_zone) {
                                navigateCrossZone(exitData.to_vnum, exitData.to_zone);
                            } else {
                                navigateToRoom(exitData.to_vnum, exitData.to_zone);
                            }
                        };
                        exitsList.appendChild(btn);
                    });
                }
                return;
            }

            const floor = zone.floors[String(state.currentFloor)];
            if (!floor) return;

            // Floor tabs - iterate over actual floor IDs (which can be negative)
            const tabsContainer = document.getElementById('floorTabs');
            tabsContainer.innerHTML = '';
            const floorIds = Object.keys(zone.floors)
                .map(k => parseInt(k))
                .sort((a, b) => b - a);  // highest floor first (0, -1, -2...)
            
            for (const f of floorIds) {
                const tab = document.createElement('button');
                tab.className = `floor-tab ${f === state.currentFloor ? 'active' : ''}`;
                tab.textContent = `Floor ${f}`;
                tab.setAttribute('role', 'tab');
                tab.setAttribute('aria-selected', f === state.currentFloor ? 'true' : 'false');
                tab.setAttribute('aria-label', `Switch to floor ${f}`);
                tab.onclick = () => switchFloor(f);
                tabsContainer.appendChild(tab);
            }

            updateRoomInfo(floor);
            updateZoneNpcList(zone);
        }

        function makeExitBtn(dir, destName, exitData) {
            const btn = document.createElement('button');
            const classes = ['exit-btn'];
            if (exitData.is_cross_zone) classes.push('cross-zone');
            else if (exitData.is_portal) classes.push('portal');
            btn.className = classes.join(' ');
            btn.setAttribute('role', 'listitem');
            btn.setAttribute('data-is-portal', exitData.is_portal ? 'true' : 'false');
            btn.setAttribute('data-is-cross', exitData.is_cross_zone ? 'true' : 'false');
            btn.setAttribute('aria-label', `Go ${dir} to ${destName}`);

            const dirSpan = document.createElement('span');
            dirSpan.className = 'exit-dir';
            dirSpan.textContent = dir.toUpperCase();

            const destSpan = document.createElement('span');
            destSpan.className = 'exit-dest';
            destSpan.textContent = destName;

            btn.appendChild(dirSpan);
            btn.appendChild(destSpan);

            if (exitData.is_portal) {
                const badge = document.createElement('span');
                badge.className = 'exit-badge';
                badge.textContent = '🚪';
                badge.setAttribute('aria-label', 'portal');
                btn.appendChild(badge);
            }
            if (exitData.is_cross_zone) {
                const badge = document.createElement('span');
                badge.className = 'exit-badge';
                badge.textContent = '🌍';
                badge.setAttribute('aria-label', 'cross-zone');
                btn.appendChild(badge);
            }
            return btn;
        }

        function updateRoomInfo(floor) {
            const rooms = floor.rooms;
            let selectedRoom = null;

            if (state.selectedRoom && rooms[String(state.selectedRoom)]) {
                selectedRoom = rooms[String(state.selectedRoom)];
            } else if (Object.keys(rooms).length > 0) {
                selectedRoom = rooms[Object.keys(rooms)[0]];
                state.selectedRoom = selectedRoom.vnum;
            }

            const exitsList = document.getElementById('exitsList');

            if (selectedRoom) {
                document.getElementById('roomVnum').textContent = `Room #${selectedRoom.vnum}`;
                document.getElementById('roomName').textContent = selectedRoom.name;
                document.getElementById('roomDesc').textContent = selectedRoom.description || '';

                exitsList.innerHTML = '';
                const EXIT_ORDER = ['u','d','n','ne','nw','e','w','se','sw','s'];
                const exits = Object.entries(selectedRoom.exits || {}).sort(([a], [b]) => {
                    const ai = EXIT_ORDER.indexOf(a.toLowerCase());
                    const bi = EXIT_ORDER.indexOf(b.toLowerCase());
                    if (ai === -1 && bi === -1) return a.localeCompare(b);
                    if (ai === -1) return 1; if (bi === -1) return -1;
                    return ai - bi;
                });

                if (exits.length === 0) {
                    exitsList.innerHTML = '<div style="color:var(--text-dim);font-size:13px;">No exits</div>';
                } else {
                    exits.forEach(([direction, exitData]) => {
                        let destName = '';
                        if (exitData.is_cross_zone) {
                            destName = exitData.to_zone;
                        } else {
                            const toZone = state.allZones[exitData.to_zone];
                            const destRoom = toZone ? getRoom(toZone, exitData.to_vnum) : null;
                            destName = destRoom ? destRoom.name : 'Unknown';
                        }

                        const btn = makeExitBtn(direction, destName, exitData);
                        btn.onclick = () => {
                            if (exitData.is_cross_zone) {
                                navigateCrossZone(exitData.to_vnum, exitData.to_zone);
                            } else if (exitData.is_portal || direction.toLowerCase().startsWith('go')) {
                                navigateToPortal(selectedRoom.vnum, exitData.to_vnum, direction);
                            } else {
                                navigateToRoom(exitData.to_vnum, exitData.to_zone);
                            }
                        };
                        exitsList.appendChild(btn);
                    });
                }
            } else {
                document.getElementById('roomVnum').textContent = '—';
                document.getElementById('roomName').textContent = 'Select a room';
                document.getElementById('roomDesc').textContent = '';
                exitsList.innerHTML = '';
            }

            updateNpcRoomPanel(selectedRoom);
        }

        // ============================================================================
        // Hover Card & NPC Modal
        // ============================================================================

        function positionHoverCard(event) {
            const card = document.getElementById('hoverCard');
            const margin = 16;
            let x = event.clientX + margin;
            let y = event.clientY + margin;
            if (x + 265 > window.innerWidth)  x = event.clientX - 265 - margin;
            if (y + 160 > window.innerHeight) y = event.clientY - 160 - margin;
            card.style.left = x + 'px';
            card.style.top  = y + 'px';
        }

        let _hideHoverTimeout = null;
        let _suppressHide = false;
        function hideHoverCard() {
            document.getElementById('hoverCard').style.display = 'none';
            state._activeHoverNpc = null;
        }
        function scheduleHideHoverCard() {
            if (_suppressHide) return;
            _hideHoverTimeout = setTimeout(hideHoverCard, 350);
        }
        function cancelHideHoverCard() {
            if (_hideHoverTimeout) { clearTimeout(_hideHoverTimeout); _hideHoverTimeout = null; }
        }

        function showMultiNpcHoverCard(uniqueNpcs, nums, event) {
            const card = document.getElementById('hoverCard');
            const items = uniqueNpcs.map((npc, i) =>
                `<div class="hc-row"><span style="color:var(--npc-unique)">${nums[i] || i + 1}</span>  ${escapeHtml(npc.name)}</div>`
            ).join('');
            card.innerHTML = `<div class="hc-meta" style="margin-bottom:4px;">Unique NPCs</div>${items}`;
            positionHoverCard(event);
            card.style.display = 'block';
        }

        function showNpcHoverCard(npcName, event) {
            const data = state.npcData[npcName];
            if (!data) return;
            state._activeHoverNpc = npcName;
            cancelHideHoverCard();
            const meta = [data.level && `Lvl ${data.level}`, data['class'], data.race].filter(Boolean).join(' · ');
            const loadsHtml = (data.loads || []).length > 0
                ? `<div class="hc-loads">${data.loads.map(i =>
                      `<span class="hc-load-chip" data-item="${escapeHtml(i)}">${escapeHtml(i)}</span>`
                  ).join('')}</div>`
                : '';
            const card = document.getElementById('hoverCard');
            _suppressHide = true;
            card.innerHTML = `
                <div class="hc-name">${escapeHtml(npcName)}</div>
                ${meta ? `<div class="hc-meta">${escapeHtml(meta)}</div>` : ''}
                <div class="hc-stats">
                    ${data.hp != null ? `<div class="hc-stat">HP <span>${data.hp}</span></div>` : ''}
                    ${data.xp != null ? `<div class="hc-stat">XP <span>${data.xp}</span></div>` : ''}
                </div>
                ${loadsHtml}
            `;
            _suppressHide = false;
            card.querySelectorAll('.hc-load-chip').forEach(el => {
                el.addEventListener('mouseenter', e => { cancelHideHoverCard(); showItemHoverCard(el.dataset.item, e); });
                el.addEventListener('mouseleave', cancelHideHoverCard);
            });
            positionHoverCard(event);
            card.style.display = 'block';
        }

        function showItemHoverCard(itemName, event) {
            const data = state.itemData[itemName];
            if (!data) return;
            cancelHideHoverCard();
            const typeColor = data.type === 'armor' ? 'var(--accent)' : data.type === 'weapon' ? 'var(--red)' : 'var(--green)';
            let rows = '';
            if (data.type === 'armor') {
                if (data.slot)       rows += `<div class="hc-row">Slot <span>${escapeHtml(data.slot)}</span></div>`;
                if (data.ac)         rows += `<div class="hc-row">AC <span>${data.ac}</span></div>`;
                if (data.stat1)      rows += `<div class="hc-row"><span>${escapeHtml(data.stat1)}</span></div>`;
                if (data.stat2)      rows += `<div class="hc-row"><span>${escapeHtml(data.stat2)}</span></div>`;
                if (data.special)    rows += `<div class="hc-row">Special <span>${escapeHtml(data.special)}</span></div>`;
                if (data.disenchant) rows += `<div class="hc-row gold">Disenchant <span>${data.disenchant}</span></div>`;
            } else if (data.type === 'weapon') {
                if (data.damage)     rows += `<div class="hc-row">Damage <span>${escapeHtml(data.damage)}</span>${data.avg ? ` · avg <span>${data.avg}</span>` : ''}</div>`;
                if (data.wield)      rows += `<div class="hc-row">Wield <span>${escapeHtml(data.wield)}</span></div>`;
                if (data.stat1)      rows += `<div class="hc-row"><span>${escapeHtml(data.stat1)}</span></div>`;
                if (data.stat2)      rows += `<div class="hc-row"><span>${escapeHtml(data.stat2)}</span></div>`;
                if (data.stat3)      rows += `<div class="hc-row"><span>${escapeHtml(data.stat3)}</span></div>`;
                if (data.disenchant) rows += `<div class="hc-row gold">Disenchant <span>${data.disenchant}</span></div>`;
            } else {
                if (data.effect)  rows += `<div class="hc-row">Effect <span>${escapeHtml(data.effect)}</span></div>`;
                if (data.charges) rows += `<div class="hc-row">Charges <span>${data.charges}</span></div>`;
                if (data.bound)   rows += `<div class="hc-row">Bound <span>${escapeHtml(data.bound)}</span></div>`;
            }
            const card = document.getElementById('hoverCard');
            _suppressHide = true;
            card.innerHTML = `
                <div class="hc-type" style="color:${typeColor}">${data.type}</div>
                <div class="hc-name">${escapeHtml(itemName)}</div>
                ${rows}
            `;
            _suppressHide = false;
            positionHoverCard(event);
            card.style.display = 'block';
        }

        function showNpcModal(npcName, roomVnum, floorId) {
            const data = state.npcData[npcName] || {};
            const meta = [data.level && `Level ${data.level}`, data['class'], data.race].filter(Boolean).join(' · ');
            const stats = [
                data.hp != null ? `<div class="npc-stat"><div class="npc-stat-label">HP</div><div class="npc-stat-value">${data.hp}</div></div>` : '',
                data.xp != null ? `<div class="npc-stat"><div class="npc-stat-label">XP</div><div class="npc-stat-value">${data.xp}</div></div>` : '',
            ].join('');
            const loadsHtml = (data.loads || []).length > 0
                ? `<div class="npc-modal-section">
                       <div class="section-label" style="margin-bottom:8px;">Loads</div>
                       <div class="npc-modal-loads">${(data.loads || []).map(i =>
                           `<span class="load-chip" data-item="${escapeHtml(i)}">${escapeHtml(i)}</span>`
                       ).join('')}</div>
                   </div>`
                : '';
            const jumpHtml = roomVnum != null
                ? `<button class="npc-modal-jump" id="npcModalJump">⟶ Jump to room</button>`
                : '';

            const content = document.getElementById('npcModalContent');
            content.innerHTML = `
                <div class="npc-modal-name">${escapeHtml(npcName)}</div>
                ${meta ? `<div class="npc-modal-meta">${escapeHtml(meta)}</div>` : ''}
                ${stats ? `<div class="npc-modal-stats">${stats}</div>` : ''}
                ${data.description ? `<div class="npc-modal-desc">${escapeHtml(data.description)}</div>` : ''}
                ${loadsHtml}
                ${jumpHtml}
            `;

            content.querySelectorAll('.load-chip').forEach(el => {
                el.addEventListener('mouseenter', e => { cancelHideHoverCard(); showItemHoverCard(el.dataset.item, e); });
                el.addEventListener('mouseleave', scheduleHideHoverCard);
                el.addEventListener('mousemove',  e => positionHoverCard(e));
            });

            if (roomVnum != null) {
                document.getElementById('npcModalJump').onclick = () => {
                    hideNpcModal();
                    state.selectedRoom = roomVnum;
                    if (state.currentFloor !== floorId) {
                        state.currentFloor = floorId;
                        state.goPortalView = null;
                        resetView(false);
                    }
                    centerOnRoom(roomVnum);
                    render();
                };
            }
            document.getElementById('npcModal').style.display = 'flex';
        }

        function hideNpcModal() {
            document.getElementById('npcModal').style.display = 'none';
            hideHoverCard();
        }

        // ============================================================================
        // NPC
        // ============================================================================

        function buildUniqueNpcIndex(zone) {
            if (!zone) return [];
            const result = [];
            const floorIds = Object.keys(zone.floors).map(k => parseInt(k)).sort((a, b) => b - a);
            for (const fid of floorIds) {
                const floor = zone.floors[String(fid)];
                const vnums = Object.keys(floor.rooms).map(k => parseInt(k)).sort((a, b) => a - b);
                for (const vnum of vnums) {
                    const room = floor.rooms[String(vnum)];
                    for (const npc of (room.npcs || [])) {
                        if (npc.unique) {
                            result.push({ ...npc, roomName: room.name, roomVnum: vnum, floorId: fid, idx: result.length + 1 });
                        }
                    }
                }
            }
            return result;
        }

        function makeNpcCard(npc, roomName) {
            const card = document.createElement('div');
            card.className = 'npc-card';
            const color = npc.unique ? 'var(--npc-unique)' : 'var(--npc-common)';
            const dotLabel = npc.idx != null ? String(npc.idx) : '';
            card.innerHTML = `
                <div class="npc-card-header">
                    <div class="npc-dot" style="background:${color}">${escapeHtml(dotLabel)}</div>
                    <div class="npc-name">${escapeHtml(npc.name)}</div>
                </div>
                ${roomName ? `<div class="npc-room-tag">${escapeHtml(roomName)}</div>` : ''}
                ${npc.description ? `<div class="npc-desc">${escapeHtml(npc.description)}</div>` : ''}
            `;
            card.addEventListener('mouseenter', e => showNpcHoverCard(npc.name, e));
            card.addEventListener('mouseleave', scheduleHideHoverCard);
            card.addEventListener('mousemove',  e => positionHoverCard(e));
            card.onclick = () => showNpcModal(npc.name, npc.roomVnum, npc.floorId);
            return card;
        }

        function updateNpcRoomPanel(room) {
            const list = document.getElementById('npcRoomList');
            if (!list) return;
            const uniqueNpcs = ((room && room.npcs) || []).filter(n => n.unique);
            if (uniqueNpcs.length === 0) {
                list.innerHTML = '<div class="npc-empty">No unique NPCs in this room</div>';
                return;
            }
            list.innerHTML = '';
            const zone = state.allZones[state.currentZone];
            const zoneIndex = buildUniqueNpcIndex(zone);
            uniqueNpcs.forEach(npc => {
                const indexed = zoneIndex.find(n => n.name === npc.name && n.roomVnum === (room && room.vnum));
                list.appendChild(makeNpcCard(indexed || npc, ''));
            });
        }

        function updateZoneNpcList(zone) {
            const list = document.getElementById('npcZoneList');
            const countEl = document.getElementById('npcZoneCount');
            if (!list || !zone) return;

            const all = buildUniqueNpcIndex(zone);

            countEl.textContent = all.length ? String(all.length) : '';
            list.innerHTML = '';

            if (all.length === 0) {
                list.innerHTML = '<div class="npc-empty">No unique NPCs in this zone</div>';
                return;
            }
            all.forEach(npc => {
                list.appendChild(makeNpcCard(npc, npc.roomName));
            });
        }

        function getRoom(zone, vnum) {
            for (let floor of Object.values(zone.floors)) {
                if (floor.rooms[String(vnum)]) {
                    return floor.rooms[String(vnum)];
                }
            }
            return null;
        }

        async function navigateToRoom(toVnum, toZone) {
            if (state.currentZone !== toZone) {
                const data = await loadZoneData(toZone);
                if (!data) return;
                
                state.currentZone = toZone;
                
                // Find the floor with this room - iterate actual floor IDs
                const floorIds = Object.keys(data.floors).map(k => parseInt(k));
                for (const f of floorIds) {
                    if (data.floors[String(f)].rooms[String(toVnum)]) {
                        state.currentFloor = f;
                        break;
                    }
                }
            } else {
                // Same zone, find floor with this room
                const zone = state.allZones[state.currentZone];
                const floorIds = Object.keys(zone.floors).map(k => parseInt(k));
                for (const f of floorIds) {
                    if (zone.floors[String(f)].rooms[String(toVnum)]) {
                        state.currentFloor = f;
                        break;
                    }
                }
            }

            state.selectedRoom = toVnum;
            state.isInPortal = false;
            state.portalHistory = [];
            centerOnRoom(toVnum);
            render();
        }

        async function navigateCrossZone(toVnum, toZone) {
            // Load the destination zone if not already loaded
            document.getElementById('mapTitle').textContent = `Loading ${toZone}…`;
            const data = await loadZoneData(toZone);
            if (!data) {
                document.getElementById('mapTitle').textContent = `Failed to load ${toZone}`;
                return;
            }

            // Find which floor contains the destination room - iterate actual floor IDs
            let destFloor = 0;
            const floorIds = Object.keys(data.floors).map(k => parseInt(k));
            for (const f of floorIds) {
                if (data.floors[String(f)].rooms[String(toVnum)]) {
                    destFloor = f;
                    break;
                }
            }

            // Update zone dropdown to reflect new zone
            const dropdown = document.getElementById('zoneDropdown');
            if (dropdown) dropdown.value = toZone;

            state.currentZone  = toZone;
            state.currentFloor = destFloor;
            state.selectedRoom = toVnum;
            state.isInPortal   = false;
            state.portalHistory = [];
            // Reset zoom/pan but center on the actual destination vnum,
            // not the floor entry_vnum (which resetView(true) would use).
            state.zoom = 1.0;
            state.panX = 0;
            state.panY = 0;
            updateZoomLevel();
            centerOnRoom(toVnum);
            render();
        }

        async function navigateToPortal(fromVnum, toVnum, exitDir) {
            const isGoPortal = exitDir.toLowerCase().startsWith('go');

            if (isGoPortal) {
                // Pre-load the destination zones for all of the portal room's onward exits
                // so the dummy node name is available immediately on the first visit.
                const zone = state.allZones[state.currentZone];
                if (zone) {
                    let portalRoom = null;
                    for (const f of Object.values(zone.floors)) {
                        if (f.rooms[String(toVnum)]) { portalRoom = f.rooms[String(toVnum)]; break; }
                    }
                    if (portalRoom) {
                        const loads = Object.values(portalRoom.exits || {})
                            .filter(ex => ex.to_vnum !== fromVnum && !state.allZones[ex.to_zone])
                            .map(ex => loadZoneData(ex.to_zone));
                        if (loads.length) await Promise.all(loads);
                    }
                }

                // "go X" portals: show an isolated mini-view, don't touch the main map.
                state.goPortalView = { sourceVnum: fromVnum, portalVnum: toVnum, direction: exitDir };
                render();
                return;
            }

            // u/d portals: switch floors within the same zone (existing behaviour).
            const zone = state.allZones[state.currentZone];
            
            // Find which floor the destination room is on - iterate actual floor IDs
            let destFloor = 0;
            const floorIds = Object.keys(zone.floors).map(k => parseInt(k));
            for (const f of floorIds) {
                if (zone.floors[String(f)].rooms[String(toVnum)]) {
                    destFloor = f;
                    break;
                }
            }

            // Save to history: where we came from
            state.portalHistory.push({
                zone: state.currentZone,
                room: fromVnum,
                floor: state.currentFloor,
                exitDir: exitDir
            });

            // Navigate to portal room
            state.selectedRoom = toVnum;
            state.currentFloor = destFloor;
            state.isInPortal = true;
            centerOnRoom(toVnum);
            render();
        }

        function exitGoPortalView() {
            // Return from go-portal mini-view back to the main map.
            state.goPortalView = null;
            render();
        }

        function returnFromPortal() {
            // Return to previous room via Return button
            if (state.portalHistory.length === 0) return;
            
            const prev = state.portalHistory.pop();
            state.currentZone = prev.zone;
            state.currentFloor = prev.floor;
            state.selectedRoom = prev.room;
            state.isInPortal = state.portalHistory.length > 0;
            centerOnRoom(prev.room);
            render();
        }
        function switchFloor(floor) {
            state.currentFloor = floor;
            state.selectedRoom = null;
            state.goPortalView = null;
            resetView(true);
            render();
        }

        // ============================================================================
        // Rendering
        // ============================================================================

        function render() {
            updateSidebar();
            updateBreadcrumb();
            if (state.goPortalView) {
                renderGoPortalView();
            } else {
                renderMap();
            }
        }

        function edgeColor(dir) {
            if (dir === 'n' || dir === 's') return '#e05555';
            if (dir === 'e' || dir === 'w') return '#5588e0';
            if (dir === 'u' || dir === 'd') return '#44cc88';
            return '#e0cc44'; // diagonal / named exit
        }

        // Returns the set of vnums that are ONLY reachable via go-portal exits on this floor.
        // These rooms are hidden on the main map and shown only in the mini portal-view.
        function getGoPortalTargetVnums(floor) {
            const rooms = floor.rooms;
            // Build set of vnums reachable via non-portal exits on this floor
            const reachableByCardinal = new Set();
            Object.values(rooms).forEach(room => {
                Object.values(room.exits || {}).forEach(ex => {
                    if (!ex.is_portal && !ex.is_cross_zone) {
                        reachableByCardinal.add(ex.to_vnum);
                    }
                });
            });
            // A go-portal target is: present on this floor, NOT reachable by any cardinal exit
            // AND some room on this floor has a go-portal exit pointing to it
            const goPortalTargets = new Set();
            Object.values(rooms).forEach(room => {
                Object.values(room.exits || {}).forEach(ex => {
                    if (ex.is_portal && ex.direction && ex.direction.toLowerCase().startsWith('go')) {
                        if (rooms[String(ex.to_vnum)] && !reachableByCardinal.has(ex.to_vnum)) {
                            goPortalTargets.add(ex.to_vnum);
                        }
                    }
                });
            });
            return goPortalTargets;
        }

        // Renders the isolated portal mini-view.
        // Layout: Fountain (active, right) with its first onward exit as a dimmed
        // dummy node above it — matching the fountain.png reference.
        // The sourceVnum is never drawn; it's only used to filter the back-exit in the sidebar.
        function renderGoPortalView() {
            const { sourceVnum, portalVnum } = state.goPortalView;
            const zone = state.allZones[state.currentZone];
            if (!zone) return;

            // Find the floor containing the portal room
            let floor = null;
            for (const f of Object.values(zone.floors)) {
                if (f.rooms[String(portalVnum)]) { floor = f; break; }
            }
            if (!floor) return;

            const portalRoom = floor.rooms[String(portalVnum)];
            if (!portalRoom) return;

            // Pick the first onward exit from the portal room (excluding back to sourceVnum)
            const EXIT_ORDER = ['u','d','n','ne','nw','e','w','se','sw','s'];
            const onwardExits = Object.entries(portalRoom.exits || {})
                .filter(([, ex]) => ex.to_vnum !== sourceVnum)
                .sort(([a], [b]) => {
                    const ai = EXIT_ORDER.indexOf(a.toLowerCase());
                    const bi = EXIT_ORDER.indexOf(b.toLowerCase());
                    if (ai === -1 && bi === -1) return a.localeCompare(b);
                    if (ai === -1) return 1; if (bi === -1) return -1;
                    return ai - bi;
                });

            // The dummy node: first onward exit destination (may be null if portal is a dead-end)
            const firstExit = onwardExits.length > 0 ? onwardExits[0] : null;
            let dummyRoom = null;
            let dummyDir  = null;
            if (firstExit) {
                const [dir, ex] = firstExit;
                dummyDir = dir;
                // Try to find the room object for the name label
                const destZone = state.allZones[ex.to_zone];
                dummyRoom = destZone ? getRoom(destZone, ex.to_vnum) : null;
                // Fallback name if zone not loaded yet
                if (!dummyRoom) dummyRoom = { name: ex.is_cross_zone ? ex.to_zone : `#${ex.to_vnum}` };
            }

            const svg = document.getElementById('mapSvg');
            const container = svg.parentElement;
            const W = container.clientWidth  || 800;
            const H = container.clientHeight || 600;

            svg.setAttribute('width',  W);
            svg.setAttribute('height', H);
            svg.innerHTML = '';

            const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');

            // Portal room centered in the canvas
            const porX = (W - ROOM_WIDTH) / 2;
            const porY = (H - ROOM_HEIGHT) / 2;

            // Dummy node: above the portal room, separated by GRID_STEP_Y
            const gap = GRID_STEP_Y;
            const dumX = porX;
            const dumY = porY - gap;

            // Helper: draw a room box
            function drawMiniRoom(x, y, room, dimmed) {
                const grp = document.createElementNS('http://www.w3.org/2000/svg', 'g');

                const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                rect.setAttribute('x', x); rect.setAttribute('y', y);
                rect.setAttribute('width', ROOM_WIDTH); rect.setAttribute('height', ROOM_HEIGHT);
                rect.setAttribute('rx', '4');
                rect.setAttribute('fill',         dimmed ? '#1e2535' : '#1a6b9a');
                rect.setAttribute('stroke',       dimmed ? '#555'    : '#00ccff');
                rect.setAttribute('stroke-width', dimmed ? '1'       : '2');
                grp.appendChild(rect);

                const cx = x + ROOM_WIDTH / 2;
                const words = room.name.split(' ');
                let ln1 = '', ln2 = '';
                for (const w of words) {
                    if ((ln1 + ' ' + w).trim().length <= 14) ln1 = (ln1 + ' ' + w).trim();
                    else if (!ln2) ln2 = w;
                    else if ((ln2 + ' ' + w).length <= 14) ln2 = (ln2 + ' ' + w).trim();
                }
                if (ln2) {
                    [[ln1, -8],[ln2, 8]].forEach(([txt, dy]) => {
                        const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                        t.setAttribute('x', cx); t.setAttribute('y', y + ROOM_HEIGHT/2 + dy);
                        t.setAttribute('class', 'room-text'); t.setAttribute('pointer-events','none');
                        t.setAttribute('fill', dimmed ? '#888' : '#fff');
                        t.textContent = txt; grp.appendChild(t);
                    });
                } else {
                    const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    t.setAttribute('x', cx); t.setAttribute('y', y + ROOM_HEIGHT/2 + 4);
                    t.setAttribute('class', 'room-text'); t.setAttribute('pointer-events','none');
                    t.setAttribute('fill', dimmed ? '#888' : '#fff');
                    t.textContent = room.name.length <= 16 ? room.name : room.name.substring(0,15) + '…';
                    grp.appendChild(t);
                }
                return grp;
            }

            // Draw dummy node and edge only if there's an onward exit
            if (dummyRoom) {
                // Dashed edge from portal room up to dummy node
                const ln = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                ln.setAttribute('x1', porX + ROOM_WIDTH / 2); ln.setAttribute('y1', porY);
                ln.setAttribute('x2', dumX + ROOM_WIDTH / 2); ln.setAttribute('y2', dumY + ROOM_HEIGHT);
                ln.setAttribute('stroke', '#e0cc44'); ln.setAttribute('stroke-width', '2');
                ln.setAttribute('stroke-opacity', '0.7'); ln.setAttribute('stroke-dasharray', '6 3');
                g.appendChild(ln);

                // Direction label on the edge
                const lbX = porX + ROOM_WIDTH / 2 + 8;
                const lbY = porY - gap / 2;
                const lbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                lbl.setAttribute('x', lbX); lbl.setAttribute('y', lbY);
                lbl.setAttribute('font-size', '11'); lbl.setAttribute('fill', '#e0cc44');
                lbl.setAttribute('pointer-events', 'none');
                lbl.textContent = dummyDir;
                g.appendChild(lbl);

                g.appendChild(drawMiniRoom(dumX, dumY, dummyRoom, true));
            }

            // Portal room (active)
            g.appendChild(drawMiniRoom(porX, porY, portalRoom, false));

            svg.appendChild(g);
        }

        function renderMap() {
            const zone = state.allZones[state.currentZone];
            if (!zone) return;

            const floor = zone.floors[String(state.currentFloor)];
            if (!floor) return;

            const svg = document.getElementById('mapSvg');
            const rooms = floor.rooms;

            // ── Use PER-FLOOR bounds (each floor is a separate 2D space) ──────────────
            // This matches the deep-dive formula exactly:
            //   originX = PAD - minX * STEP_X
            //   width   = (maxX - minX + 2) * STEP_X + 2 * PAD
            const b = floor.metadata;
            const originX = PADDING - b.min_x * GRID_STEP_X;
            const originY = PADDING - b.min_y * GRID_STEP_Y;
            const width   = (b.max_x - b.min_x + 2) * GRID_STEP_X + 2 * PADDING;
            const height  = (b.max_y - b.min_y + 2) * GRID_STEP_Y + 2 * PADDING;

            // Size SVG to the VIEWPORT (container), not the map content.
            // If we size it to the map content, rooms can be panned outside the SVG
            // element boundary and get clipped by the container's overflow:hidden.
            // The zoom/pan transform group handles all positioning internally.
            const container = svg.parentElement;
            svg.setAttribute('width',  container.clientWidth  || width);
            svg.setAttribute('height', container.clientHeight || height);
            svg.innerHTML = '';

            // zoom/pan group
            const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            g.setAttribute('id', 'zoomPanGroup');
            g.setAttribute('transform',
                `translate(${state.panX}, ${state.panY}) scale(${state.zoom})`);

            // ── Identify go-portal-target rooms (hidden from main map) ────
            const goPortalTargets = getGoPortalTargetVnums(floor);

            // ── Draw edges from the flat edge list (correct topology) ──────
            // Only draw edges that belong to this floor; skip edges to/from go-portal targets
            const floorEdges = (zone.edges || []).filter(e =>
                e.floor === state.currentFloor &&
                !goPortalTargets.has(e.from) &&
                !goPortalTargets.has(e.to)
            );
            floorEdges.forEach(edge => {
                // Centre of source box
                const x1 = originX + edge.from_grid[0] * GRID_STEP_X + ROOM_WIDTH  / 2;
                const y1 = originY + edge.from_grid[1] * GRID_STEP_Y + ROOM_HEIGHT / 2;
                // Centre of dest box
                const x2 = originX + edge.to_grid[0]   * GRID_STEP_X + ROOM_WIDTH  / 2;
                const y2 = originY + edge.to_grid[1]   * GRID_STEP_Y + ROOM_HEIGHT / 2;

                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', x1);
                line.setAttribute('y1', y1);
                line.setAttribute('x2', x2);
                line.setAttribute('y2', y2);
                line.setAttribute('stroke', edgeColor(edge.direction));
                line.setAttribute('stroke-width', '2');
                line.setAttribute('stroke-opacity', '0.7');
                g.appendChild(line);
            });

            // ── Ghost nodes for cross-zone exits ──────────────────────────
            const DDELTA = {
                n: [0,-1], s: [0,1], e: [1,0], w: [-1,0],
                ne: [1,-1], nw: [-1,-1], se: [1,1], sw: [-1,1]
            };
            const realPositions = new Set(
                Object.values(rooms).map(r => `${r.grid_x},${r.grid_y}`)
            );
            const ghostNodes = {};
            Object.values(rooms).forEach(room => {
                if (goPortalTargets.has(room.vnum)) return;
                Object.values(room.exits || {}).forEach(ex => {
                    if (!ex.is_cross_zone || ex.is_portal) return;
                    const delta = DDELTA[ex.direction.toLowerCase()];
                    if (!delta) return;
                    const gx = room.grid_x + delta[0];
                    const gy = room.grid_y + delta[1];
                    const key = `${gx},${gy}`;
                    if (realPositions.has(key) || ghostNodes[key]) return;
                    ghostNodes[key] = {
                        gx, gy,
                        vnum: ex.to_vnum, zone: ex.to_zone,
                        name: ex.to_room_name || ex.to_zone,
                        srcGx: room.grid_x, srcGy: room.grid_y
                    };
                });
            });

            // Draw ghost edges first (under ghost nodes and rooms)
            Object.values(ghostNodes).forEach(ghost => {
                const x1 = originX + ghost.srcGx * GRID_STEP_X + ROOM_WIDTH / 2;
                const y1 = originY + ghost.srcGy * GRID_STEP_Y + ROOM_HEIGHT / 2;
                const x2 = originX + ghost.gx * GRID_STEP_X + ROOM_WIDTH / 2;
                const y2 = originY + ghost.gy * GRID_STEP_Y + ROOM_HEIGHT / 2;
                const ln = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                ln.setAttribute('x1', x1); ln.setAttribute('y1', y1);
                ln.setAttribute('x2', x2); ln.setAttribute('y2', y2);
                ln.setAttribute('stroke', 'var(--gold)');
                ln.setAttribute('stroke-width', '1.5');
                ln.setAttribute('stroke-opacity', '0.5');
                ln.setAttribute('stroke-dasharray', '6 3');
                g.appendChild(ln);
            });

            // Draw ghost nodes (before real rooms so real rooms render on top)
            Object.values(ghostNodes).forEach(ghost => {
                const gpx = originX + ghost.gx * GRID_STEP_X;
                const gpy = originY + ghost.gy * GRID_STEP_Y;
                const gcx = gpx + ROOM_WIDTH / 2;

                const grpG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                grpG.style.cursor = 'pointer';
                grpG.onclick = () => navigateCrossZone(ghost.vnum, ghost.zone);

                const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                rect.setAttribute('x', gpx); rect.setAttribute('y', gpy);
                rect.setAttribute('width', ROOM_WIDTH); rect.setAttribute('height', ROOM_HEIGHT);
                rect.setAttribute('rx', '6');
                rect.setAttribute('fill', 'var(--gold-dim)');
                rect.setAttribute('stroke', 'var(--gold)');
                rect.setAttribute('stroke-width', '1');
                rect.setAttribute('stroke-dasharray', '4 3');
                rect.setAttribute('opacity', '0.75');
                grpG.appendChild(rect);

                // Zone name (wrapped across two lines if needed)
                const words = ghost.zone.split(' ');
                let ln1 = '', ln2 = '';
                for (const w of words) {
                    if ((ln1 + ' ' + w).trim().length <= 14) ln1 = (ln1 + ' ' + w).trim();
                    else if (!ln2) ln2 = w;
                    else if ((ln2 + ' ' + w).length <= 14) ln2 = (ln2 + ' ' + w).trim();
                }
                const cy = gpy + ROOM_HEIGHT / 2;
                if (ln2) {
                    [[ln1, -8], [ln2, 6]].forEach(([txt, dy]) => {
                        const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                        t.setAttribute('x', gcx); t.setAttribute('y', cy + dy);
                        t.setAttribute('class', 'room-text'); t.setAttribute('pointer-events', 'none');
                        t.setAttribute('fill', 'var(--gold)'); t.setAttribute('opacity', '0.85');
                        t.textContent = txt; grpG.appendChild(t);
                    });
                } else {
                    const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    t.setAttribute('x', gcx); t.setAttribute('y', cy + 4);
                    t.setAttribute('class', 'room-text'); t.setAttribute('pointer-events', 'none');
                    t.setAttribute('fill', 'var(--gold)'); t.setAttribute('opacity', '0.85');
                    t.textContent = ghost.zone.length <= 16 ? ghost.zone : ghost.zone.substring(0, 15) + '…';
                    grpG.appendChild(t);
                }

                const tip = document.createElementNS('http://www.w3.org/2000/svg', 'title');
                tip.textContent = `${ghost.name} — ${ghost.zone}`;
                grpG.appendChild(tip);

                g.appendChild(grpG);
            });

            // ── Build room → NPC number map for badge labels ───────────────
            const roomNpcNums = {};
            buildUniqueNpcIndex(zone).forEach(e => {
                if (!roomNpcNums[e.roomVnum]) roomNpcNums[e.roomVnum] = [];
                roomNpcNums[e.roomVnum].push(e.idx);
            });

            // ── Draw rooms ─────────────────────────────────────────────────
            Object.entries(rooms).forEach(([vnumStr, room]) => {
                const vnum = parseInt(vnumStr);
                // Hide go-portal-target rooms from the main map
                if (goPortalTargets.has(vnum)) return;
                // pixel top-left of box
                const px = originX + room.grid_x * GRID_STEP_X;
                const py = originY + room.grid_y * GRID_STEP_Y;
                const cx = px + ROOM_WIDTH  / 2;
                const cy = py + ROOM_HEIGHT / 2;

                const grp = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                grp.style.cursor = 'pointer';
                grp.onclick = () => { 
                    state.selectedRoom = vnum; 
                    centerOnRoom(vnum);
                    render(); 
                };

                const isEntry = (vnum === floor.entry_vnum);
                const isSelected = (state.selectedRoom === vnum);
                let roomClass = 'room-box';
                if (isEntry) roomClass += ' entry-room';
                if (isSelected) roomClass += ' selected';

                const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                rect.setAttribute('x', px);
                rect.setAttribute('y', py);
                rect.setAttribute('width',  ROOM_WIDTH);
                rect.setAttribute('height', ROOM_HEIGHT);
                rect.setAttribute('rx', '6');
                rect.setAttribute('class', roomClass);
                rect.setAttribute('aria-label', room.name);
                grp.appendChild(rect);

                // Room name — wrap across two lines if long
                const textClass = `room-text${isSelected ? ' selected-text' : isEntry ? ' entry-text' : ''}`;
                const words = room.name.split(' ');
                let line1 = '', line2 = '';
                for (const w of words) {
                    if ((line1 + ' ' + w).trim().length <= 14) {
                        line1 = (line1 + ' ' + w).trim();
                    } else if (line2.length === 0) {
                        line2 = w;
                    } else if ((line2 + ' ' + w).length <= 14) {
                        line2 = (line2 + ' ' + w).trim();
                    }
                }
                if (line2) {
                    const t1 = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    t1.setAttribute('x', cx); t1.setAttribute('y', cy - 8);
                    t1.setAttribute('class', textClass); t1.setAttribute('pointer-events','none');
                    t1.textContent = line1;
                    grp.appendChild(t1);
                    const t2 = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    t2.setAttribute('x', cx); t2.setAttribute('y', cy + 8);
                    t2.setAttribute('class', textClass); t2.setAttribute('pointer-events','none');
                    t2.textContent = line2;
                    grp.appendChild(t2);
                } else {
                    const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    t.setAttribute('x', cx); t.setAttribute('y', cy + 4);
                    t.setAttribute('class', textClass); t.setAttribute('pointer-events','none');
                    t.textContent = room.name.length <= 16 ? room.name : room.name.substring(0,15) + '…';
                    grp.appendChild(t);
                }

                // Check for portal and cross-zone exits
                const hasPortalExit = Object.values(room.exits || {}).some(e => e.is_portal);
                const hasCrossZoneExit = Object.values(room.exits || {}).some(e => e.is_cross_zone);
                
                let badgeX = px + ROOM_WIDTH - 12;
                
                // Portal badge (🚪 - door icon)
                if (hasPortalExit) {
                    const portalBadge = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                    portalBadge.style.cursor = 'pointer';
                    portalBadge.onclick = (e) => {
                        e.stopPropagation();
                        state.selectedRoom = vnum;
                        render();
                        setTimeout(() => {
                            const exitsList = document.getElementById('exitsList');
                            const portalExits = exitsList.querySelectorAll('[data-is-portal="true"]');
                            if (portalExits.length > 0) {
                                portalExits[0].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                                portalExits[0].style.outline = '2px solid #44cc88';
                                setTimeout(() => portalExits[0].style.outline = '', 2000);
                            }
                        }, 100);
                    };

                    const portalBg = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    portalBg.setAttribute('cx', badgeX);
                    portalBg.setAttribute('cy', py + 10);
                    portalBg.setAttribute('r', 10);
                    portalBg.setAttribute('fill', '#44cc88');
                    portalBg.setAttribute('opacity', '0.9');
                    portalBadge.appendChild(portalBg);

                    const portalText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    portalText.setAttribute('x', badgeX);
                    portalText.setAttribute('y', py + 15);
                    portalText.setAttribute('text-anchor', 'middle');
                    portalText.setAttribute('font-size', '14');
                    portalText.setAttribute('font-weight', 'bold');
                    portalText.setAttribute('fill', '#000');
                    portalText.setAttribute('pointer-events', 'none');
                    portalText.textContent = '🚪';
                    portalBadge.appendChild(portalText);

                    grp.appendChild(portalBadge);
                    badgeX -= 25;
                }
                
                // Cross-zone badge (🌍 - globe icon)
                if (hasCrossZoneExit) {
                    const crossBadge = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                    crossBadge.style.cursor = 'pointer';
                    crossBadge.onclick = (e) => {
                        e.stopPropagation();
                        state.selectedRoom = vnum;
                        render();
                        setTimeout(() => {
                            const exitsList = document.getElementById('exitsList');
                            const crossExits = exitsList.querySelectorAll('[data-is-cross="true"]');
                            if (crossExits.length > 0) {
                                crossExits[0].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                                crossExits[0].style.outline = '2px solid #ffaa00';
                                setTimeout(() => crossExits[0].style.outline = '', 2000);
                            }
                        }, 100);
                    };

                    const crossBg = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    crossBg.setAttribute('cx', badgeX);
                    crossBg.setAttribute('cy', py + 10);
                    crossBg.setAttribute('r', 10);
                    crossBg.setAttribute('fill', '#ffaa00');
                    crossBg.setAttribute('opacity', '0.9');
                    crossBadge.appendChild(crossBg);

                    const crossText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    crossText.setAttribute('x', badgeX);
                    crossText.setAttribute('y', py + 15);
                    crossText.setAttribute('text-anchor', 'middle');
                    crossText.setAttribute('font-size', '14');
                    crossText.setAttribute('font-weight', 'bold');
                    crossText.setAttribute('fill', '#000');
                    crossText.setAttribute('pointer-events', 'none');
                    crossText.textContent = '🌍';
                    crossBadge.appendChild(crossText);

                    grp.appendChild(crossBadge);
                }

                // ── Unique NPC badge (bottom-left) — always visible ────────
                const npcNums = roomNpcNums[vnum] || [];
                if (npcNums.length > 0) {
                    const label = npcNums.length === 1 ? String(npcNums[0]) : String(npcNums.length);
                    const ubg = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    ubg.setAttribute('cx', px + 12);
                    ubg.setAttribute('cy', py + ROOM_HEIGHT - 10);
                    ubg.setAttribute('r', 10);
                    ubg.setAttribute('fill', 'var(--npc-unique)');
                    ubg.setAttribute('opacity', '0.92');

                    const utxt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    utxt.setAttribute('x', px + 12);
                    utxt.setAttribute('y', py + ROOM_HEIGHT - 10);
                    utxt.setAttribute('class', 'npc-badge-text');
                    utxt.textContent = label;

                    const utip = document.createElementNS('http://www.w3.org/2000/svg', 'title');
                    utip.textContent = (room.npcs || []).filter(n => n.unique).map(n => n.name).join(', ');

                    const npcG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                    npcG.style.cursor = 'pointer';
                    npcG.appendChild(ubg);
                    npcG.appendChild(utxt);
                    npcG.appendChild(utip);
                    npcG.onclick = (e) => {
                        e.stopPropagation();
                        state.selectedRoom = vnum;
                        render();
                        setTimeout(() => {
                            document.getElementById('npcsSection')
                                ?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                        }, 80);
                    };
                    const uniqueNpcs = (room.npcs || []).filter(n => n.unique);
                    const nums = npcNums[vnum] || [];
                    npcG.addEventListener('mouseenter', e => {
                        cancelHideHoverCard();
                        if (uniqueNpcs.length === 1) {
                            showNpcHoverCard(uniqueNpcs[0].name, e);
                        } else {
                            showMultiNpcHoverCard(uniqueNpcs, nums, e);
                        }
                    });
                    npcG.addEventListener('mouseleave', scheduleHideHoverCard);
                    npcG.addEventListener('mousemove',  e => positionHoverCard(e));
                    grp.appendChild(npcG);
                }

                // ── Trash NPC badge (top-left) — visible when toggle is on ──
                const trashNpcs = (room.npcs || []).filter(n => !n.unique);
                if (trashNpcs.length > 0 && state.showNpcs) {
                    const tbg = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    tbg.setAttribute('cx', px + 12);
                    tbg.setAttribute('cy', py + 10);
                    tbg.setAttribute('r', 9);
                    tbg.setAttribute('fill', 'var(--npc-common)');
                    tbg.setAttribute('opacity', '0.8');

                    const ttxt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    ttxt.setAttribute('x', px + 12);
                    ttxt.setAttribute('y', py + 10);
                    ttxt.setAttribute('class', 'npc-badge-text');
                    ttxt.textContent = trashNpcs.length > 9 ? '9+' : String(trashNpcs.length);

                    const ttip = document.createElementNS('http://www.w3.org/2000/svg', 'title');
                    ttip.textContent = trashNpcs.map(n => n.name).join(', ');

                    const trashG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                    trashG.appendChild(tbg);
                    trashG.appendChild(ttxt);
                    trashG.appendChild(ttip);
                    grp.appendChild(trashG);
                }

                g.appendChild(grp);
            });

            svg.appendChild(g);

            document.getElementById('mapTitle').textContent =
                `${state.currentZone} — Floor ${state.currentFloor}`;
            document.getElementById('roomCount').textContent =
                `${Object.keys(rooms).filter(v => !goPortalTargets.has(parseInt(v))).length} rooms`;
            document.getElementById('noRooms').style.display =
                Object.keys(rooms).length === 0 ? 'block' : 'none';
        }

        // ============================================================================
        // Zoom & Pan
        // ============================================================================

        function resetView(forceEntryRoom = false) {
            state.zoom = 1.0;
            state.panX = 0;
            state.panY = 0;
            updateZoomLevel();
            // Center on a room after resetting zoom.
            // forceEntryRoom=true: use the floor's entry_vnum (zone/floor switches).
            // forceEntryRoom=false (default): keep state.selectedRoom so navigation
            //   to a specific room doesn't get overwritten with the floor entry room.
            const zone = state.allZones[state.currentZone];
            if (zone) {
                const floorData = zone.floors[String(state.currentFloor)];
                let targetVnum;
                if (forceEntryRoom) {
                    targetVnum = (floorData && floorData.entry_vnum)
                        ? floorData.entry_vnum
                        : state.selectedRoom;
                    if (targetVnum) state.selectedRoom = targetVnum;
                } else {
                    targetVnum = state.selectedRoom
                        || (floorData && floorData.entry_vnum);
                }
                if (targetVnum) centerOnRoom(targetVnum);
            }
        }

        function centerOnRoom(vnum) {
            // Center the map on a specific room (used when clicking sidebar or node)
            const zone = state.allZones[state.currentZone];
            if (!zone) return;

            const floor = zone.floors[String(state.currentFloor)];
            if (!floor || !floor.rooms[String(vnum)]) return;

            const room = floor.rooms[String(vnum)];
            // Use PER-FLOOR bounds, not global bounds (each floor is its own 2D space)
            const b = floor.metadata;
            const originX = PADDING - b.min_x * GRID_STEP_X;
            const originY = PADDING - b.min_y * GRID_STEP_Y;

            // Room center in map coordinates
            const roomCenterX = originX + room.grid_x * GRID_STEP_X + ROOM_WIDTH / 2;
            const roomCenterY = originY + room.grid_y * GRID_STEP_Y + ROOM_HEIGHT / 2;

            // Pan to center room in viewport (keep current zoom)
            const svg = document.getElementById('mapSvg');
            const containerWidth = svg.parentElement.clientWidth;
            const containerHeight = svg.parentElement.clientHeight;

            state.panX = (containerWidth / 2) - (roomCenterX * state.zoom);
            state.panY = (containerHeight / 2) - (roomCenterY * state.zoom);
        }

        function updateZoomLevel() {
            document.getElementById('zoomLevel').textContent = Math.round(state.zoom * 100) + '%';
        }

        document.getElementById('zoomInBtn').onclick = () => {
            state.zoom = Math.min(MAX_ZOOM, Math.round((state.zoom + ZOOM_STEP) * 10) / 10);
            updateZoomLevel();
            if (state.selectedRoom) centerOnRoom(state.selectedRoom);
            render();
        };

        document.getElementById('zoomOutBtn').onclick = () => {
            state.zoom = Math.max(MIN_ZOOM, Math.round((state.zoom - ZOOM_STEP) * 10) / 10);
            updateZoomLevel();
            if (state.selectedRoom) centerOnRoom(state.selectedRoom);
            render();
        };

        document.getElementById('resetBtn').onclick = () => {
            resetView();
            render();
        };

        document.getElementById('returnBtn').onclick = () => {
            if (state.goPortalView) {
                exitGoPortalView();
            } else {
                returnFromPortal();
            }
        };

        // ── Keyboard shortcuts ────────────────────────────────────────────
        document.addEventListener('keydown', (e) => {
            // Don't capture when typing in inputs
            if (e.target.tagName === 'SELECT' || e.target.tagName === 'INPUT') return;
            switch (e.key) {
                case '+': case '=':
                    state.zoom = Math.min(MAX_ZOOM, Math.round((state.zoom + ZOOM_STEP) * 10) / 10);
                    updateZoomLevel();
                    if (state.selectedRoom) centerOnRoom(state.selectedRoom);
                    render();
                    break;
                case '-':
                    state.zoom = Math.max(MIN_ZOOM, Math.round((state.zoom - ZOOM_STEP) * 10) / 10);
                    updateZoomLevel();
                    if (state.selectedRoom) centerOnRoom(state.selectedRoom);
                    render();
                    break;
                case 'r': case 'R':
                    resetView(); render();
                    break;
                case 'Escape':
                    if (document.getElementById('npcModal').style.display !== 'none') { hideNpcModal(); }
                    else if (state.goPortalView) { exitGoPortalView(); }
                    else if (state.portalHistory.length > 0) { returnFromPortal(); }
                    break;
            }
        });

        // Update breadcrumb and Return button visibility
        function updateBreadcrumb() {
            const breadcrumbEl = document.getElementById('breadcrumb');
            const returnBtn = document.getElementById('returnBtn');
            
            if (state.goPortalView) {
                breadcrumbEl.textContent = `Portal: [${state.goPortalView.direction}]`;
                returnBtn.style.display = 'block';
            } else if (state.portalHistory.length === 0) {
                breadcrumbEl.textContent = '';
                returnBtn.style.display = 'none';
            } else {
                const path = state.portalHistory.map(h => h.exitDir.toUpperCase()).join(' > ');
                breadcrumbEl.textContent = `Portal: ${path}`;
                returnBtn.style.display = 'block';
            }
        }

        // Zoom with mouse wheel — incremental steps clamped to [MIN_ZOOM, MAX_ZOOM]
        document.getElementById('mapContainer').addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY < 0 ? ZOOM_STEP : -ZOOM_STEP;
            state.zoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM,
                Math.round((state.zoom + delta) * 10) / 10));
            updateZoomLevel();
            if (state.selectedRoom) centerOnRoom(state.selectedRoom);
            render();
        });

        // Pan with drag
        const mapContainer = document.getElementById('mapContainer');
        mapContainer.addEventListener('mousedown', (e) => {
            state.isDragging = true;
            state.dragStart = { x: e.clientX, y: e.clientY };
            mapContainer.classList.add('dragging');
        });

        document.addEventListener('mousemove', (e) => {
            if (state.isDragging && state.dragStart) {
                const dx = e.clientX - state.dragStart.x;
                const dy = e.clientY - state.dragStart.y;
                state.panX += dx;
                state.panY += dy;
                state.dragStart = { x: e.clientX, y: e.clientY };
                render();
            }
        });

        document.addEventListener('mouseup', () => {
            state.isDragging = false;
            mapContainer.classList.remove('dragging');
        });

        // ============================================================================
        // Initialization
        // ============================================================================

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        async function init() {
            const zoneDropdown = document.getElementById('zoneDropdown');

            // Load zones, NPC stats, and item stats in parallel
            let zoneNames = [];
            try {
                const [zoneResp, npcResp, itemResp] = await Promise.all([
                    fetch('zones.json'),
                    fetch('npcs.json').catch(() => null),
                    fetch('items.json').catch(() => null),
                ]);
                if (zoneResp.ok) zoneNames = await zoneResp.json();
                if (npcResp?.ok)  state.npcData  = await npcResp.json();
                if (itemResp?.ok) state.itemData = await itemResp.json();
            } catch (_) {}

            if (zoneNames.length === 0) {
                zoneDropdown.innerHTML =
                    '<option value="">No zones.json found — run export script first</option>';
                document.getElementById('mapTitle').textContent =
                    'Run generate_json_proper.bat to generate zone data';
                return;
            }

            // Populate dropdown
            zoneDropdown.innerHTML = '';
            zoneNames.forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                zoneDropdown.appendChild(opt);
            });

            // Change handler
            zoneDropdown.addEventListener('change', async (e) => {
                const newZone = e.target.value;
                if (newZone && newZone !== state.currentZone) {
                    state.currentZone   = newZone;
                    state.goPortalView  = null;
                    state.portalHistory = [];
                    document.getElementById('mapTitle').textContent = 'Loading…';
                    const data = await loadZoneData(newZone);
                    if (data) {
                        // Pick the highest floor id (surface = 0, underground = negative)
                        const floorIds = Object.keys(data.floors).map(k => parseInt(k)).sort((a, b) => b - a);
                        state.currentFloor = floorIds[0] ?? 0;
                        const entryFloor = data.floors[String(state.currentFloor)];
                        state.selectedRoom = entryFloor?.entry_vnum ?? null;
                        resetView(true);
                        render();
                    }
                }
            });

            // Load first zone
            const first = zoneNames[0];
            state.currentZone = first;
            zoneDropdown.value = first;
            document.getElementById('mapTitle').textContent = 'Loading…';
            const data = await loadZoneData(first);
            if (data) {
                const floorIds = Object.keys(data.floors).map(k => parseInt(k)).sort((a, b) => b - a);
                state.currentFloor = floorIds[0] ?? 0;
                const entryFloor = data.floors[String(state.currentFloor)];
                state.selectedRoom = entryFloor?.entry_vnum ?? null;
                resetView(true);
                render();
            } else {
                document.getElementById('mapTitle').textContent = 'Error loading zone';
            }
        }

        // ── Touch support ─────────────────────────────────────────────────
        let lastTouchDist = null;
        let lastTouchCenter = null;

        mapContainer.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                state.isDragging = true;
                state.dragStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            } else if (e.touches.length === 2) {
                state.isDragging = false;
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                lastTouchDist = Math.sqrt(dx * dx + dy * dy);
                lastTouchCenter = {
                    x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
                    y: (e.touches[0].clientY + e.touches[1].clientY) / 2
                };
            }
        }, { passive: true });

        mapContainer.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (e.touches.length === 1 && state.isDragging && state.dragStart) {
                const dx = e.touches[0].clientX - state.dragStart.x;
                const dy = e.touches[0].clientY - state.dragStart.y;
                state.panX += dx;
                state.panY += dy;
                state.dragStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                render();
            } else if (e.touches.length === 2 && lastTouchDist !== null) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const scale = dist / lastTouchDist;
                const newZoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM,
                    Math.round(state.zoom * scale * 10) / 10));
                if (newZoom !== state.zoom) {
                    state.zoom = newZoom;
                    updateZoomLevel();
                    if (state.selectedRoom) centerOnRoom(state.selectedRoom);
                    render();
                }
                lastTouchDist = dist;
            }
        }, { passive: false });

        mapContainer.addEventListener('touchend', () => {
            state.isDragging = false;
            lastTouchDist = null;
        }, { passive: true });

        // ── Mobile sidebar toggle ─────────────────────────────────────────
        const sidebarEl = document.getElementById('sidebar');
        const overlayEl = document.getElementById('sidebarOverlay');
        const toggleBtn = document.getElementById('sidebarToggle');

        function openSidebar() {
            sidebarEl.classList.add('open');
            overlayEl.classList.add('open');
            toggleBtn.setAttribute('aria-expanded', 'true');
            toggleBtn.textContent = '✕';
        }

        function closeSidebar() {
            sidebarEl.classList.remove('open');
            overlayEl.classList.remove('open');
            toggleBtn.setAttribute('aria-expanded', 'false');
            toggleBtn.textContent = '☰';
        }

        toggleBtn.onclick = () => {
            if (sidebarEl.classList.contains('open')) { closeSidebar(); }
            else { closeNpcSidebar(); openSidebar(); }
        };

        const npcSidebarEl  = document.getElementById('npcSidebar');
        const npcToggleFab  = document.getElementById('npcSidebarToggle');

        function openNpcSidebar() {
            closeSidebar();
            npcSidebarEl.classList.add('open');
            overlayEl.classList.add('open');
            npcToggleFab.setAttribute('aria-expanded', 'true');
        }
        function closeNpcSidebar() {
            npcSidebarEl.classList.remove('open');
            overlayEl.classList.remove('open');
            npcToggleFab.setAttribute('aria-expanded', 'false');
        }

        npcToggleFab.onclick = () => {
            npcSidebarEl.classList.contains('open') ? closeNpcSidebar() : openNpcSidebar();
        };

        overlayEl.addEventListener('click', () => { closeSidebar(); closeNpcSidebar(); });

        // Close sidebar after selecting an exit on mobile
        document.getElementById('exitsList').addEventListener('click', () => {
            if (window.innerWidth <= 768) closeSidebar();
        });

        window.addEventListener('resize', () => {
            if (window.innerWidth > 768) { closeSidebar(); closeNpcSidebar(); }
        });

        // ── NPC toggle & search ───────────────────────────────────────────
        document.getElementById('hoverCard').addEventListener('mouseenter', cancelHideHoverCard);
        document.getElementById('hoverCard').addEventListener('mouseleave', scheduleHideHoverCard);
        document.getElementById('npcModalClose').onclick = hideNpcModal;
        document.getElementById('npcModal').addEventListener('click', e => {
            if (e.target === document.getElementById('npcModal')) hideNpcModal();
        });

        const npcToggleBtn = document.getElementById('npcToggleBtn');
        function updateNpcToggleStyle() {
            if (state.showNpcs) {
                npcToggleBtn.style.background  = 'var(--red-dim)';
                npcToggleBtn.style.borderColor = 'var(--red)';
                npcToggleBtn.style.color       = '#f0a0a0';
            } else {
                npcToggleBtn.style.background  = '';
                npcToggleBtn.style.borderColor = '';
                npcToggleBtn.style.color       = '';
            }
        }
        updateNpcToggleStyle();
        npcToggleBtn.onclick = () => {
            state.showNpcs = !state.showNpcs;
            updateNpcToggleStyle();
            render();
        };

        init();
    </script>
</body>
